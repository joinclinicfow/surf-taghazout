<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SURF-TAGHAZOUT.MA | Official Premium Asset</title>
    <style>
        :root {
            --gold: #d4af37;
            --dark: #0f172a;
            --light: #f8fafc;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            color: var(--light);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        .luxury-card {
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            padding: 60px 40px;
            border-radius: 2px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 600px;
            width: 90%;
            position: relative;
        }
        .badge {
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 12px;
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 5px 15px;
            display: inline-block;
            margin-bottom: 30px;
        }
        h1 {
            font-size: 2.5rem;
            letter-spacing: -1px;
            margin: 0 0 10px 0;
            font-weight: 300;
        }
        .domain-name {
            font-weight: 800;
            color: #fff;
        }
        p {
            font-size: 1.1rem;
            color: #94a3b8;
            line-height: 1.6;
            margin-bottom: 40px;
        }
        .btn {
            background: var(--gold);
            color: var(--dark);
            text-decoration: none;
            padding: 18px 40px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            display: inline-block;
        }
        .btn:hover {
            background: #fff;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .stats {
            margin-top: 40px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 30px;
        }
        .stat-item { font-size: 0.8rem; color: #64748b; }
        .stat-value { color: var(--gold); display: block; font-weight: bold; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div class="luxury-card">
        <div class="badge">Asset Management</div>
        <h1>Acquisition Priority: <br><span class="domain-name">surf-taghazout.ma</span></h1>
        <p>This premium digital asset is currently available for acquisition or strategic partnership. Seize the leading domain for the Taghazout surf industry.</p>
        
        <a href="https://wa.me/212608245835?text=Je%20souhaite%20faire%20une%20offre%20pour%20surf-taghazout.ma" class="btn">Make an Offer</a>

        <div class="stats">
            <div class="stat-item"><span class="stat-value">HIGH</span>SEO Authority</div>
            <div class="stat-item"><span class="stat-value">PREMIUM</span>Targeted Traffic</div>
        </div>
    </div>

</body>
</html>
